# ─── Probe / timing ───────────────────────────────────────────
baseline_probe_duration: 10
baseline_probe_interval: 2
ramp_steps: 2
ramp_probe_duration: 10
ramp_probe_interval: 2
recovery_probe_duration: 10
recovery_probe_interval: 2
kb_timeout: 5m
skip_log_file: true
probe_readyz: 1

# ─── CPU contention ───────────────────────────────────────────
mode_cpu: on
ramp_cpu_replicas: 1
ramp_cpu_millicores: 50

# ─── Memory contention ────────────────────────────────────────
mode_mem: on
ramp_mem_replicas: 1
ramp_mem_mb: 32

# ─── Disk contention ──────────────────────────────────────────
mode_disk: off
ramp_disk_replicas: 1
ramp_disk_mb: 64

# ─── Network contention ───────────────────────────────────────
mode_network: off
ramp_net_replicas: 1
ramp_net_interval: 0.5

# ─── API stress ────────────────────────────────────────────────
mode_api: off
ramp_api_qps: 20
ramp_api_burst: 40
ramp_api_iterations: 50
ramp_api_replicas: 5

# ─── Cluster monitor ──────────────────────────────────────────
cluster_monitor: 0
monitor_interval: 10

# ─── Safety limits ────────────────────────────────────────────
# The run will abort if estimated resource usage exceeds these
# limits (unless SAFETY_BYPASS=1 or confirmed interactively).
safety_max_pods: 2000
safety_max_namespaces: 100
safety_max_objects_per_step: 5000

# ─── Images / registry ────────────────────────────────────────
# Uncomment and set these for air-gapped or private-registry clusters.
# image_map_file: /path/to/image-map.txt
# image_pull_secret: my-registry-secret
# skip_image_load: 0
