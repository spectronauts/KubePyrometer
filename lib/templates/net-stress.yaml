apiVersion: apps/v1
kind: Deployment
metadata:
  name: net-stress-step-{{.step}}-{{.Replica}}
  labels:
    app: kb-stress
    kb-step: "{{.step}}"
    kb-type: net
spec:
  replicas: {{.podReplicas}}
  selector:
    matchLabels:
      app: kb-stress
      kb-step: "{{.step}}"
      kb-type: net
      kb-replica: "{{.Replica}}"
  template:
    metadata:
      labels:
        app: kb-stress
        kb-step: "{{.step}}"
        kb-type: net
        kb-replica: "{{.Replica}}"
    spec:
      containers:
        - name: netburn
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                wget -q -T 2 -O /dev/null "http://net-echo:8080/payload" 2>/dev/null || true
                sleep "${INTERVAL}"
              done
          env:
            - name: INTERVAL
              value: "{{.netInterval}}"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
