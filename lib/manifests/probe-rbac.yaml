apiVersion: v1
kind: Namespace
metadata:
  name: kb-probe
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: probe-sa
  namespace: kb-probe
---
# Cluster-scoped: /readyz (nonResourceURL) and node listing require ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kb-probe-reader
rules:
  - nonResourceURLs: ["/readyz", "/healthz", "/livez"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kb-probe-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kb-probe-reader
subjects:
  - kind: ServiceAccount
    name: probe-sa
    namespace: kb-probe
---
# Namespace-scoped: configmap listing is restricted to kube-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kb-probe-configmap-reader
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kb-probe-configmap-reader-binding
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kb-probe-configmap-reader
subjects:
  - kind: ServiceAccount
    name: probe-sa
    namespace: kb-probe
