apiVersion: apps/v1
kind: Deployment
metadata:
  name: disk-stress-step-{{.step}}-{{.Replica}}
  labels:
    app: kb-stress
    kb-step: "{{.step}}"
    kb-type: disk
spec:
  replicas: {{.podReplicas}}
  selector:
    matchLabels:
      app: kb-stress
      kb-step: "{{.step}}"
      kb-type: disk
      kb-replica: "{{.Replica}}"
  template:
    metadata:
      labels:
        app: kb-stress
        kb-step: "{{.step}}"
        kb-type: disk
        kb-replica: "{{.Replica}}"
    spec:
      containers:
        - name: diskburn
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              i=0
              while true; do
                dd if=/dev/zero of=/scratch/fill-$i bs=1M count=${DISK_MB} 2>/dev/null
                sync
                rm -f /scratch/fill-$i
                i=$((i + 1))
              done
          env:
            - name: DISK_MB
              value: "{{.diskMb}}"
          volumeMounts:
            - name: scratch
              mountPath: /scratch
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: scratch
          emptyDir: {}
